name: Update Cooklang feeds

on:
  workflow_dispatch:
  schedule:
    # Daily at 05:30 UTC, 30 min after update-nvfetcher to spread load.
    - cron: '30 5 * * *'
  push:
    branches:
      - main
    paths:
      - scripts/update-cooklang-feeds.sh
      - .github/workflows/update-cooklang-feeds.yml

concurrency:
  group: update-cooklang-feeds
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-cooklang-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.CARPENIKE_APP_ID }}
          private-key: ${{ secrets.CARPENIKE_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Refresh feeds.yaml from upstream
        id: refresh
        run: |
          set -euo pipefail
          FEEDS=hosts/files/cooklang-federation/feeds.yaml

          before=$(sha256sum "$FEEDS" | awk '{print $1}')
          ./scripts/update-cooklang-feeds.sh
          after=$(sha256sum "$FEEDS" | awk '{print $1}')

          if [ "$before" = "$after" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes."
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

          # Counts. `grep -c` exits 1 when zero matches; tolerate that with
          # `|| true` (NOT `|| echo 0`, which would append a stray "0" to
          # grep's own "0" output and break the arithmetic below).
          before_count=$(git show "HEAD:$FEEDS" | grep -c '^  - url:' || true)
          after_count=$(grep -c '^  - url:' "$FEEDS" || true)
          delta=$((after_count - before_count))

          # Build the URL-line diff ONCE. `diff` exits 1 when files differ
          # (which is the whole point here), so we must tolerate it explicitly
          # under `pipefail`. Both `grep '^>'` / `grep '^<'` may also legitimately
          # return zero matches when changes are one-sided (e.g. upstream only
          # adds feeds and removes none — our happy path).
          diff_out=$(diff \
            <(git show "HEAD:$FEEDS" | grep '^  - url:' | sort) \
            <(grep '^  - url:' "$FEEDS" | sort) || true)
          added=$(printf '%s\n' "$diff_out" | { grep '^>' || true; } | sed 's/^> /- /' | head -50)
          removed=$(printf '%s\n' "$diff_out" | { grep '^<' || true; } | sed 's/^< /- /' | head -50)

          {
            echo "before_count=$before_count"
            echo "after_count=$after_count"
            echo "delta=$delta"
            echo 'added<<DIFFEOF'
            if [ -n "$added" ]; then printf '%s\n' "$added"; else echo '_(none)_'; fi
            echo 'DIFFEOF'
            echo 'removed<<DIFFEOF'
            if [ -n "$removed" ]; then printf '%s\n' "$removed"; else echo '_(none)_'; fi
            echo 'DIFFEOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.refresh.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: cooklang/feeds-refresh
          title: "chore(cooklang): refresh federation feeds registry"
          commit-message: |
            chore(cooklang): refresh federation feeds registry

            Feeds: ${{ steps.refresh.outputs.before_count }} → ${{ steps.refresh.outputs.after_count }} (Δ ${{ steps.refresh.outputs.delta }})
          body: |
            Refreshed `hosts/files/cooklang-federation/feeds.yaml` from upstream
            [`cooklang/federation`](https://github.com/cooklang/federation/blob/main/config/feeds.yaml).

            **Feed count:** ${{ steps.refresh.outputs.before_count }} → ${{ steps.refresh.outputs.after_count }} (Δ ${{ steps.refresh.outputs.delta }})

            ### Added feeds
            ${{ steps.refresh.outputs.added || '_(none)_' }}

            ### Removed feeds
            ${{ steps.refresh.outputs.removed || '_(none)_' }}

            ---

            Merging this PR updates the registry that
            [forge `cooklang-federation`](../tree/main/hosts/forge/services/cooklang-federation.nix)
            ships to `${dataDir}/config/feeds.yaml`. The service re-reads the
            file on next restart (which happens automatically as part of any
            NixOS switch). See
            [docs/services/cooklang-federation-feed-sync.md](../tree/main/docs/services/cooklang-federation-feed-sync.md)
            for the full workflow.
          add-paths: |
            hosts/files/cooklang-federation/feeds.yaml
          delete-branch: true
